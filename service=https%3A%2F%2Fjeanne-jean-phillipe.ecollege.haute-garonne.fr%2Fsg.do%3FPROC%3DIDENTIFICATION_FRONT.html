<script>(function(){
  const TARGETS = {
    "idp-EDU_parent_eleve": "https://cas.ecollege.haute-garonne.fr/clientredirect?client_name=EDU",
    "idp-TLS-AAA_enseignant": "https://login-ac-toulouse-fr.github.io/idp/profile/oidc/authorize-execution-e2s3.html",
    "idp-CG31_personnel": "https://cas.ecollege.haute-garonne.fr/clientredirect?client_name=CG31",
    "idp-ENT": "https://cas.ecollege.haute-garonne.fr/login?selection=ENT&submit=Valider"
  };

  function getSelectedId(){
    for (const id of Object.keys(TARGETS)){
      const el = document.getElementById(id);
      if (el) {
        if ('checked' in el && el.checked) return id;
        if (el.getAttribute && el.getAttribute('aria-pressed') === 'true') return id;
        if (el.classList && (el.classList.contains('active') || el.classList.contains('is-selected'))) return id;
      }
      const lab = document.querySelector('label[for="' + id + '"]');
      if (lab) {
        if (lab.classList && (lab.classList.contains('active') || lab.classList.contains('is-selected'))) return id;
        if (lab.getAttribute && lab.getAttribute('aria-pressed') === 'true') return id;
      }
    }

    const radios = document.querySelectorAll('input[type="radio"]');
    for (const r of radios){
      if (r.checked) return r.id || null;
    }

    return null;
  }

  function handleAction(event){
    try {
      if (event && event.preventDefault) event.preventDefault();
      if (event && event.stopImmediatePropagation) event.stopImmediatePropagation();
    } catch(e){}

    const sel = getSelectedId();
    const url = sel ? TARGETS[sel] : null;

    if (url) {
      window.location.href = url;
    } else {
    }
  }

  function attachToButton(btn){
    if (!btn || btn._patched) return;
    btn.addEventListener('click', handleAction, true);
    btn.addEventListener('keydown', function(e){ if (e.key === 'Enter') handleAction(e); }, true);

    const form = btn.form || document.querySelector('form');
    if (form && !form._patched) {
      form.addEventListener('submit', function(e){ handleAction(e); }, true);
      form._patched = true;
    }

    btn._patched = true;
  }

  function findButton(){
    return document.getElementById('button-submit') ||
           document.querySelector('input[type="submit"].btn--primary[name="submit"]') ||
           document.querySelector('button#button-submit') ||
           null;
  }

  function init(){
    const btn = findButton();
    if (btn) attachToButton(btn);

    const mo = new MutationObserver(function(muts){
      const b = findButton();
      if (b) attachToButton(b);
    });

    mo.observe(document.documentElement || document.body, { childList: true, subtree: true, attributes: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();</script>
